workflows:
  ios-build:
    name: iOS Build

    environment:
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          cd ios
          pod install

      - name: Build
        script: |
          xcodebuild \
          -workspace ios/Runner.xcworkspace \
          -scheme Runner \
          -configuration Release \
          -sdk iphoneos \
          build

    artifacts:
      - build/**/Build/**/*.app
